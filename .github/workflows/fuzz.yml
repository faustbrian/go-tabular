name: Fuzz smoke tests

on:
  pull_request:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzDelimitedReader
          - FuzzExtractBytes
          - FuzzFixedWidthReader
          - FuzzOpenZIP
          - FuzzOpenXLS
          - FuzzOpenSpreadsheet
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test . -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime=10s
