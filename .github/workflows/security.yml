name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '43 4 * * 2'

permissions:
  contents: read

jobs:
  vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
