name: Large benchmarks

on:
  schedule:
    - cron: '23 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Benchmark 50 MiB CSV
        run: |
          /usr/bin/time -v go test -tags=largebench -run '^$' \
            -bench '^BenchmarkDelimitedReader50MiB$' -benchmem \
            -benchtime=1x 2>&1 | tee /tmp/csv-benchmark.txt
      - name: Benchmark 50 MiB XLSX
        run: |
          /usr/bin/time -v go test -tags=largebench -run '^$' \
            -bench '^BenchmarkXLSXReader50MiB$' -benchmem \
            -benchtime=1x 2>&1 | tee /tmp/xlsx-benchmark.txt
      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo '## 50 MiB benchmark results'
            echo '```text'
            cat /tmp/csv-benchmark.txt /tmp/xlsx-benchmark.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
