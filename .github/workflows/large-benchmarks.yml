name: Large benchmarks

on:
  schedule:
    - cron: '23 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Benchmark 50 MiB CSV
        run: |
          /usr/bin/time -v go test -tags=largebench -run '^$' \
            -bench '^BenchmarkDelimitedReader50MiB$' -benchmem \
            -benchtime=1x 2>&1 | tee /tmp/csv-benchmark.txt
      - name: Benchmark 50 MiB XLSX
        run: |
          /usr/bin/time -v go test -tags=largebench -run '^$' \
            -bench '^BenchmarkXLSXReader50MiB$' -benchmem \
            -benchtime=1x 2>&1 | tee /tmp/xlsx-benchmark.txt
      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo '## 50 MiB benchmark results'
            echo '```text'
            cat /tmp/csv-benchmark.txt /tmp/xlsx-benchmark.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
