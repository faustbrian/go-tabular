name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate semantic version tag
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]
      - run: go mod verify
      - run: go test -race ./...
      - run: bash scripts/check-coverage.sh
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@db9de0fc1a667e1a49d2291a1a042dff081d78f6 # v9
        with:
          version: v2.11.4
      - run: go test ./... -run '^Example'
      - run: bash scripts/check-doc-links.sh
      - name: Verify fuzz targets
        run: |
          for target in FuzzDelimitedReader FuzzExtractBytes FuzzFixedWidthReader FuzzOpenZIP FuzzOpenXLS FuzzOpenSpreadsheet; do
            go test . -run '^$' -fuzz "^${target}$" -fuzztime=1s
          done
      - run: go test ./... -run '^$' -bench . -benchtime=1x
      - uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1
        with:
          go-version-file: go.mod
      - name: Publish source release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
