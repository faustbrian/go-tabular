name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up minimum Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Verify module metadata
        run: go mod tidy -diff
      - name: Check formatting
        run: make format-check
      - name: Enforce Go source safety
        run: ./scripts/check-go-safety.sh
      - name: Run static analysis
        run: make vet
      - name: Run race tests
        run: make test-race
      - name: Enforce meaningful coverage
        run: make coverage
      - name: Validate documentation
        run: make docs
      - name: Smoke fuzz targets
        run: make fuzz FUZZ_TIME=2s
      - name: Smoke benchmarks
        run: make benchmark BENCH_TIME=1x

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up minimum Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

  compatibility:
    name: Go ${{ matrix.go }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go:
          - 1.25.x
          - stable
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: Run tests
        run: go test ./...
