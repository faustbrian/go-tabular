name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up minimum Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Verify module metadata
        run: go mod tidy -diff
      - name: Check formatting
        run: make format-check
      - name: Run static analysis
        run: make vet
      - name: Run race tests
        run: make test-race
      - name: Enforce meaningful coverage
        run: make coverage
      - name: Validate documentation
        run: make docs
      - name: Smoke fuzz targets
        run: make fuzz FUZZ_TIME=2s
      - name: Smoke benchmarks
        run: make benchmark BENCH_TIME=1x

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up minimum Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

  compatibility:
    name: Go ${{ matrix.go }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go:
          - 1.25.x
          - stable
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: Run tests
        run: go test ./...
